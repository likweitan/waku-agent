<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Waku わく</title>
<link rel="stylesheet" href="/static/style.css"></head><body>
<nav id="nav">
  <div class="brand">Waku わく<small id="model" style="cursor:pointer" title="click to change the model" onclick="location.hash='#settings'"></small>
    <button id="nav-toggle" title="Hide sidebar">&#10094;</button></div>
  <div class="grp">System</div>
  <a href="#overview" data-v="overview">Overview</a>
  <a href="#gateway" data-v="gateway">Gateway <span class="n" id="n-gw"></span></a>
  <a href="#loop" data-v="loop">Loop <span class="n" id="n-loop"></span></a>
  <a href="#memory" data-v="memory">Memory <span class="n" id="n-mem"></span></a>
  <a href="#tools" data-v="tools">Tools <span class="n" id="n-tools"></span></a>
  <a href="#database" data-v="database">Database <span class="n" id="n-db"></span></a>
  <a href="#ops" data-v="ops">Ops <span class="n" id="n-ops"></span></a>
  <a href="#compare" data-v="compare">Compare</a>
  <a href="#settings" data-v="settings">Settings</a>
</nav>
<div class="resizer" id="nav-resizer" title="Drag to resize sidebar"></div>
<main>
  <header class="pagehead">
    <h1 id="title">Overview</h1>
    <div class="sub" id="sub"></div>
  </header>
  <div id="view"></div>
</main>
<div class="resizer" id="dock-resizer" title="Drag to resize chat"></div>
<aside id="dock">
  <div class="dockhead">
    <span class="dt">Chat</span>
    <span class="arch-status"></span>
    <button id="dock-close" title="Collapse chat">&rsaquo;</button>
  </div>
  <div class="sesshead" style="padding:8px 2px 0">
    <button class="sessbtn" onclick="newChat()">+ New chat</button>
    <button class="sessbtn" onclick="toggleSessMenu(event)">History &#9662;</button>
    <button class="sessbtn teletoggle" id="teletoggle" onclick="toggleTele()" title="Show/hide per-turn stats: gate decision, seconds, iterations, tools">stats</button>
    <button class="modelchip" id="modelchip" onclick="toggleModelMenu(event)" title="Switch the model for this chat">&hellip;</button>
  </div>
  <div class="chatlog" id="docklog"></div>
  <div class="chatbar">
    <input id="dmsg" placeholder="Message Waku&hellip;" autocomplete="off">
    <button id="mic" title="Click to talk — local Whisper, no cloud"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
    <button id="dsend">Send</button>
  </div>
</aside>
<button id="nav-reopen" title="Show sidebar">&#9776;</button>
<button id="dock-reopen" title="Open chat">&lsaquo; Chat</button>
<!-- Frontend is split into focused classic scripts sharing one global scope
     (no build step, no modules). Order matters only in that main.js runs the
     bootstrap and must load LAST. See static/README.md for the file map. -->
<script src="/static/js/util.js"></script>
<script src="/static/js/memory.js"></script>
<script src="/static/js/models.js"></script>
<script src="/static/js/render.js"></script>
<script src="/static/js/diagram.js"></script>
<script src="/static/js/views.js"></script>
<script src="/static/js/compare.js"></script>
<script src="/static/js/dock.js"></script>
<script src="/static/js/main.js"></script></body></html>
